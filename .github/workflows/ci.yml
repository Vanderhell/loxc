name: CI

on:
  push:
    branches: [master, main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test (${{ matrix.os }}, ${{ matrix.cc }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        cc: [gcc, clang]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ${{ matrix.cc }}

      - name: Show compiler version
        run: ${{ matrix.cc }} --version

      - name: Build
        env:
          CC: ${{ matrix.cc }}
        run: make

      - name: Run tests
        env:
          CC: ${{ matrix.cc }}
        run: make test

      - name: Build examples
        env:
          CC: ${{ matrix.cc }}
        run: make examples

      - name: Run hello world example
        run: ./examples/01_hello_world

  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Test
        run: make test

      - name: Examples
        run: make examples

  valgrind:
    name: Valgrind memory check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Build
        run: make

      - name: Run tests under valgrind
        run: |
          for test in tests/test_*; do
            if [ -x "$test" ] && [[ ! "$test" =~ \.c$ ]]; then
              echo "=== Running $test under valgrind ==="
              valgrind --error-exitcode=1 \
                       --leak-check=full \
                       --show-leak-kinds=all \
                       --errors-for-leak-kinds=all \
                       "$test" || true
            fi
          done

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [test, test-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release artifacts
        run: |
          make clean
          make
          make examples

          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p release/loxc-${VERSION}

          cp -r include src tools tests examples docs benchmarks trainings release/loxc-${VERSION}/
          cp Makefile LICENSE README.md CHANGELOG.md CONTRIBUTING.md release/loxc-${VERSION}/
          cp CODE_OF_CONDUCT.md SECURITY.md AUTHORS BENCHMARKS.md release/loxc-${VERSION}/

          find release/loxc-${VERSION} -name '*.o' -delete
          find release/loxc-${VERSION} -name '*.a' -delete
          find release/loxc-${VERSION} -type f ! -name '*.*' -executable -delete 2>/dev/null || true

          cd release
          tar -czf loxc-${VERSION}-src.tar.gz loxc-${VERSION}/
          tar -cjf loxc-${VERSION}-src.tar.bz2 loxc-${VERSION}/
          zip -r loxc-${VERSION}-src.zip loxc-${VERSION}/

          ls -la

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          awk "/^## \[${VERSION}\]/,/^## \[/" CHANGELOG.md | sed '$d' > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release ${VERSION}" > release_notes.md
            echo "" >> release_notes.md
            echo "See [CHANGELOG.md](CHANGELOG.md) for details." >> release_notes.md
          fi
          cat release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            release/loxc-*.tar.gz
            release/loxc-*.tar.bz2
            release/loxc-*.zip
