name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test (${{ matrix.os }}, ${{ matrix.cc }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        cc: [gcc, clang]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ${{ matrix.cc }}

      - name: Show compiler version
        run: ${{ matrix.cc }} --version

      - name: Build
        env:
          CC: ${{ matrix.cc }}
        run: make

      - name: Run tests
        env:
          CC: ${{ matrix.cc }}
        run: make test

      - name: Build examples
        env:
          CC: ${{ matrix.cc }}
        run: make examples

      - name: Run hello world example
        run: ./examples/01_hello_world

  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Test
        run: make test

      - name: Examples
        run: make examples

  valgrind:
    name: Valgrind memory check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Build
        run: make

      - name: Run tests under valgrind
        run: |
          for test in tests/test_*; do
            if [ -x "$test" ] && [[ ! "$test" =~ \.c$ ]]; then
              echo "=== Running $test under valgrind ==="
              valgrind --error-exitcode=1 \
                       --leak-check=full \
                       --show-leak-kinds=all \
                       --errors-for-leak-kinds=all \
                       "$test" || true
            fi
          done
