name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test (${{ matrix.os }}, ${{ matrix.cc }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        cc: [gcc, clang]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ${{ matrix.cc }}

      - name: Show compiler version
        run: ${{ matrix.cc }} --version

      - name: Build
        env:
          CC: ${{ matrix.cc }}
        run: make

      - name: Run tests
        env:
          CC: ${{ matrix.cc }}
        run: make test

      - name: Build examples
        env:
          CC: ${{ matrix.cc }}
        run: make examples

      - name: Run hello world example
        run: ./examples/01_hello_world

  package:
    name: Package and consumers (Ubuntu, gcc/g++)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build package set
        env:
          CC: gcc
          CXX: g++
        run: make package

  sanitize:
    name: Sanitizers (Ubuntu, clang)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential clang

      - name: Build and test with sanitizers
        env:
          CC: clang
          CXX: clang++
        run: make sanitize

  analyze:
    name: Static analysis (Ubuntu, clang-tidy/cppcheck/fanalyzer)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential clang clang-tidy cppcheck

      - name: Run clang static analysis
        run: make analyze

  fuzz:
    name: Fuzz harness smoke (Ubuntu, clang)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential clang

      - name: Build fuzz harness
        env:
          CC: clang
        run: make fuzz

      - name: Run fuzz seeds
        run: ./fuzz/loxc_tab_fuzz fuzz/seeds/*.loxctab

  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Test
        run: make test

      - name: Examples
        run: make examples

  valgrind:
    name: Valgrind memory check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Build
        run: make

      - name: Run tests under valgrind
        run: |
          for test in tests/test_*; do
            if [ -x "$test" ] && [[ ! "$test" =~ \.c$ ]]; then
              echo "=== Running $test under valgrind ==="
              valgrind --error-exitcode=1 \
                       --leak-check=full \
                       --show-leak-kinds=all \
                       --errors-for-leak-kinds=all \
                       "$test" || true
            fi
          done
