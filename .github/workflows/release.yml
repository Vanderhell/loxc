name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release artifacts
        run: |
          make clean
          make
          make examples

          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p release/loxc-${VERSION}

          cp -r include src tools tests examples docs benchmarks trainings release/loxc-${VERSION}/
          cp Makefile LICENSE README.md CHANGELOG.md CONTRIBUTING.md release/loxc-${VERSION}/
          cp CODE_OF_CONDUCT.md SECURITY.md AUTHORS BENCHMARKS.md release/loxc-${VERSION}/

          find release/loxc-${VERSION} -name '*.o' -delete
          find release/loxc-${VERSION} -name '*.a' -delete
          find release/loxc-${VERSION} -type f ! -name '*.*' -executable -delete 2>/dev/null || true

          cd release
          tar -czf loxc-${VERSION}-src.tar.gz loxc-${VERSION}/
          tar -cjf loxc-${VERSION}-src.tar.bz2 loxc-${VERSION}/
          zip -r loxc-${VERSION}-src.zip loxc-${VERSION}/

          ls -la

      - name: Extract changelog for this version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          awk "/^## \[${VERSION}\]/,/^## \[/" CHANGELOG.md | sed '$d' > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release ${VERSION}" > release_notes.md
            echo "" >> release_notes.md
            echo "See [CHANGELOG.md](CHANGELOG.md) for details." >> release_notes.md
          fi
          cat release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            release/loxc-*.tar.gz
            release/loxc-*.tar.bz2
            release/loxc-*.zip
